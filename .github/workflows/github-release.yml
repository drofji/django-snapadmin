name: GitHub Release from docs/releases

# Creates a GitHub Release whenever a version tag (v*) is pushed.
# Reads the release notes from docs/releases/X.Y.Z.txt and attaches them to the release.
#
# The release is marked as a pre-release if the version contains alpha (a) or beta (b).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version and pre-release flag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ (a|b) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Read release notes from docs/releases/
        id: notes
        run: |
          NOTES_FILE="docs/releases/${{ steps.version.outputs.version }}.txt"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file not found: $NOTES_FILE"
            exit 1
          fi
          # Read the file and escape for GitHub output
          {
            echo "notes<<EOF"
            cat "$NOTES_FILE"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "v${{ steps.version.outputs.version }}" \
            $PRERELEASE_FLAG \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}"
