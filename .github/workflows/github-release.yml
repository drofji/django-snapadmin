name: GitHub Release from docs/releases

# Creates a GitHub Release whenever a version tag (v*) is pushed.
# Reads the release notes from docs/releases/X.Y.Z.txt and attaches them to the release.
#
# The release is marked as a pre-release if the version contains alpha (a) or beta (b).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  # Gate: don't publish a GitHub release for a tag whose tests don't pass.
  test:
    name: Test suite
    uses: ./.github/workflows/test.yml

  release:
    name: Create GitHub Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version and pre-release flag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ (a|b) ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          NOTES_FILE="docs/releases/${VERSION}.txt"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "::error::Release notes file not found: $NOTES_FILE"
            exit 1
          fi

          PRERELEASE_FLAG=""
          if [ "$PRERELEASE" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          # Pass the notes as a FILE — never inline. The notes contain backticks,
          # quotes and $ that a shell would otherwise try to expand/execute.
          gh release create "v${VERSION}" \
            $PRERELEASE_FLAG \
            --title "v${VERSION}" \
            --notes-file "$NOTES_FILE"
