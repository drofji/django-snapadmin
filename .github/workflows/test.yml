name: Tests

# Runs the full pytest suite across the supported Python × Django matrix on every push and pull
# request to main, and enforces the 100% coverage bar on the shipped `snapadmin/` package. The suite
# mocks Elasticsearch / Redis / Celery and uses an in-memory SQLite database, so no service
# containers are needed.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: py${{ matrix.python }} · Django ${{ matrix.django }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        django: ["5.2", "6.0"]
        exclude:
          # Django 6.0 requires Python >= 3.12.
          - python: "3.10"
            django: "6.0"
          - python: "3.11"
            django: "6.0"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install dependencies
        # Deliberately NOT `pip install -e .` — the suite runs against the source tree (as it does
        # locally), and several tests + coverage branches assert that django-snapadmin is *not* an
        # installed distribution (the PackageNotFoundError fallbacks in __init__/fetch/licensing).
        # demo/requirements.txt provides every runtime + optional dependency the suite imports.
        run: |
          python -m pip install --upgrade pip
          pip install -r demo/requirements.txt
          pip install "Django~=${{ matrix.django }}.0"

      - name: Show resolved versions
        run: |
          python --version
          python -c "import django; print('Django', django.get_version())"

      - name: Run tests with 100% coverage gate
        # `python -m pytest` (not the bare `pytest` console script) so the repository root lands on
        # sys.path — the suite imports `snapadmin` and `demo` straight from the source tree, exactly
        # as it runs locally. A bare `pytest` would fail to import `demo.core.settings_test`.
        run: python -m pytest --cov=snapadmin --cov-report=term-missing --cov-fail-under=100
